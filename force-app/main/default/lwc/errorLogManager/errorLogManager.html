<template>
    <lightning-card title="Retry Failed Records" icon-name="standard:log">
        <template lwc:if={isLoading}>
            <div class="slds-p-around_medium">
                <lightning-spinner alternative-text="Loading payload..." size="small"></lightning-spinner>
            </div>
        </template>
        <template lwc:elseif={error}>
            <div class="slds-p-around_medium">
                <p class="slds-text-color_error">{error}</p>
            </div>
        </template>
        <template lwc:elseif={hasRecords}>
            <div class="slds-p-around_medium">
                <p class="slds-m-bottom_small slds-text-body_small slds-text-color_weak">
                    Edit field values inline then click Submit for Retry. The <em>Error</em> column shows why each record failed.
                </p>
                <lightning-datatable
                    key-field="_rowKey"
                    data={tableData}
                    columns={columns}
                    draft-values={draftValues}
                    hide-checkbox-column
                    onsave={handleInlineSave}
                ></lightning-datatable>
                <div class="slds-m-top_medium">
                    <lightning-button
                        label="Submit for Retry"
                        variant="brand"
                        onclick={handleRetry}
                        disabled={isSubmitting}
                    ></lightning-button>
                </div>
            </div>
        </template>
        <template lwc:else>
            <div class="slds-p-around_medium">
                <p>No failed record payload found for this log.</p>
            </div>
        </template>
    </lightning-card>
</template>
